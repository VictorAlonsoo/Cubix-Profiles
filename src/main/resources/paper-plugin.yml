name: CubixProfiles
version: '${project.version}'
main: com.victoralonso.cubixprofiles.CubixProfiles
api-version: '1.21'
authors:
  - victoralonso
description: Visor de perfiles virtual para Paper.

# join-classpath: true is required for paper-plugin.yml classloader isolation.
# Without it, classes from soft-depended plugins are not visible at runtime.
dependencies:
  server:
    PlaceholderAPI:
      load: BEFORE
      required: false
      join-classpath: true
    HMCCosmetics:
      load: BEFORE
      required: false
      join-classpath: true
    LuckPerms:
      load: BEFORE
      required: false
      join-classpath: true
    Vault:
      load: BEFORE
      required: false
      join-classpath: true

libraries:
  - "org.xerial:sqlite-jdbc:3.49.1.0"
  - "com.zaxxer:HikariCP:5.1.0"
  - "com.mysql:mysql-connector-j:9.2.0"

permissions:
  cubixprofiles.profile:
    description: Use /profile to view profiles.
    default: true
  cubixprofiles.settings:
    description: Use /profile settings to toggle visibility.
    default: true
  cubixprofiles.admin.reload:
    description: Use /profile reload to reload the configuration.
    default: op
  cubixprofiles.admin.bypass:
    description: Bypass world restrictions and view hidden profiles.
    default: op
