title: "<bold><#FFFFFF>Profile: <#5AB0FF><player>"

# Number of rows: 1-6 (default: 6 = 54 slots)
rows: 4

# ──────────────────────────────────────────────
#  Head slot — fully configurable like any other item.
#
#  Placeholders available in name/lore/actions:
#    <player>  — profile owner's name  ← THIS is the target being viewed
#    <prefix>  — rank prefix (may contain MiniMessage tags; LuckPerms or Vault)
#    <viewer>  — player who opened the GUI
#    %papi%    — any PlaceholderAPI placeholder (resolved for the viewer)
#
#  All standard item fields apply: material, texture, custom-model-data,
#  item-model, tooltip-style, hide-tooltip, lore, actions, sound.
# ──────────────────────────────────────────────
head:
  slot: 12
  name: "<white><prefix><player>"
  # lore:
  #   - "<#A5ACB8>Viewing <#5AB0FF><player><#A5ACB8>'s profile."
  #   - "<#A5ACB8>Opened by <#5AB0FF><viewer>"
  hide-tooltip: true
  # actions:
  #   - "[close]"

# ──────────────────────────────────────────────
#  Global click sound.
#  Per-item sound (see items: section) overrides this.
# ──────────────────────────────────────────────
click-sound:
  enabled: true
  sound: "minecraft:ui.button.click"
  source: MASTER
  volume: 0.4
  pitch: 1.0

# Positions for the Minecraft equipment items.
equipment-slots:
  helmet:     1
  chestplate: 10
  leggings:   19
  boots:      28

# Positions for cosmetic items.
cosmetic-slots:
  hmcc_HELMET:   0
  hmcc_BACKPACK: 9
  hmcc_OFFHAND:  18
  hmcc_BALLOON:  27

# ──────────────────────────────────────────────
#  Custom items rendered inside the GUI.
#
#  Fields:
#    enabled:           true | false  (default: true)
#    slot:              single slot   (0 – size-1)
#    slots:             "0-35"  |  "0,1,2"  |  [0, 1, 2]
#    material:          BUKKIT material name  ← required
#    texture:           base64 value from minecraft-heads.com  ← only with PLAYER_HEAD / CUSTOM_HEAD
#    name:              MiniMessage string    ← required
#    lore:              list of MiniMessage lines
#    custom-model-data: integer
#    item-model:        "namespace:path"
#    tooltip-style:     "namespace:path"
#    hide-tooltip:      true | false  (default: false)
#
#  Actions (executed on click — <player> = target, <viewer> = who clicked):
#    actions:
#      - "[player]  <command>"   — viewer runs a command (no slash)
#      - "[console] <command>"   — console runs a command
#      - "[message] <text>"      — sends a MiniMessage message to the viewer
#      - "[close]"               — closes the inventory
#
#  Per-item sound (overrides click-sound for this item only):
#    sound:
#      sound:  "namespace:key"
#      source: MASTER
#      volume: 1.0
#      pitch:  1.0
# ──────────────────────────────────────────────
items:

  filler:
    enabled: true
    slots: "0-35"
    material: GRAY_STAINED_GLASS_PANE
    name: " "

  # ── Teleport button — <player> resolves to the profile owner (target) ──
  teleport:
    enabled: true
    slot: 31
    material: ENDER_PEARL
    name: "<bold><#FFFFFF>Teleport"
    lore:
      - "<#A5ACB8>Click to teleport to <#5AB0FF><player><#A5ACB8>."
    actions:
      - "[player] /tp <player>"
      - "[message] <#83CA16>Message sent to <#5AB0FF><player><#83CA16>."
      - "[close]"
    sound:
      sound: "minecraft:entity.enderman.teleport"
      source: MASTER
      volume: 1.0
      pitch: 1.0

  example_custom_head:
    slot: 32
    material: CUSTOM_HEAD
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMTA5Y2RlMWFmYzk1YTQ3NGQyMjI1NTQwOTdlZDZkMzkxZTdjYzdhZTFmMjAyZmRiZmQyZDZkYmM5ODMwOTM3MCJ9fX0="
    name: "<white>My Button"

