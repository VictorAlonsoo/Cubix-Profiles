title: "<bold><#FFFFFF>Profile: <#5AB0FF><player>"

# Number of rows: 1-6 (default: 6 = 54 slots)
rows: 6

# ──────────────────────────────────────────────
#  Head slot — fully configurable like any other item.
#
#  Placeholders available in name/lore:
#    <player>  — profile owner's name
#    <prefix>  — rank prefix (may contain MiniMessage tags; LuckPerms or Vault)
#    <viewer>  — player viewing the GUI
#    %papi%    — any PlaceholderAPI placeholder (resolved for the viewer)
#
#  All standard item fields apply: custom-model-data, item-model,
#  tooltip-style, hide-tooltip, lore, actions, sound.
# ──────────────────────────────────────────────
head:
  slot: 4
  name: "<white><prefix><player>"
  # lore:
  #   - "<#A5ACB8>Click to inspect."
  # custom-model-data: 0
  # item-model: "namespace:path"
  # tooltip-style: "namespace:path"
  # hide-tooltip: false
  # actions:
  #   - "[close]"
  # sound:
  #   sound: "minecraft:ui.button.click"
  #   source: MASTER
  #   volume: 1.0
  #   pitch: 1.0

# ──────────────────────────────────────────────
#  Global click sound.
#  Played whenever a player clicks a slot that contains an item.
#  Per-item sound (see items: section) overrides this value.
# ──────────────────────────────────────────────
click-sound:
  enabled: true
  sound: "minecraft:ui.button.click"
  source: MASTER
  volume: 0.3
  pitch: 1.0

# Positions for the Minecraft equipment items.
equipment-slots:
  helmet:     13
  mainHand:   20
  chestplate: 22
  offHand:    24
  leggings:   31
  boots:      40

# Positions for cosmetic items.
# Key format: <provider_prefix>_<SLOT_NAME>
# HMCCosmetics prefix: hmcc_
cosmetic-slots:
  hmcc_HELMET:    5
  hmcc_BACKPACK:  48
  hmcc_BALLOON:   50
  # hmcc_CHESTPLATE: ...
  # hmcc_LEGGINGS:   ...
  # hmcc_BOOTS:      ...
  # hmcc_MAINHAND:   ...
  # hmcc_OFFHAND:    ...

# ──────────────────────────────────────────────
#  Custom items rendered inside the GUI.
#
#  Fields:
#    enabled:           true | false  (default: true)
#    slot:              single slot   (0 – size-1)
#    slots:             "0-53"  |  "0,1,2"  |  [0, 1, 2]
#    material:          BUKKIT material name  ← required
#    name:              MiniMessage string    ← required
#    lore:              list of MiniMessage lines
#    custom-model-data: integer
#    item-model:        "namespace:path"
#    tooltip-style:     "namespace:path"
#    hide-tooltip:      true | false  (default: false)
#
#  Actions (executed on click):
#    actions:
#      - "[player]  <command>"   — viewer runs a command (no slash)
#      - "[console] <command>"   — console runs a command
#      - "[message] <text>"      — sends a MiniMessage message to the viewer
#      - "[close]"               — closes the inventory
#    Placeholders: <player>, <prefix>, <viewer>, %papi%
#
#  Per-item sound (overrides click-sound for this item only):
#    sound:
#      sound:  "namespace:key"
#      source: MASTER
#      volume: 1.0
#      pitch:  1.0
# ──────────────────────────────────────────────
items:

  filler:
    enabled: true
    slots: "0-53"
    material: GRAY_STAINED_GLASS_PANE
    name: " "
    # lore: []
    # custom-model-data: 0
    # item-model: "minecraft:item/gray_stained_glass_pane"
    # tooltip-style: "minecraft:default"
    # hide-tooltip: false
    # actions: []
    # sound:
    #   sound: "minecraft:ui.button.click"
    #   source: MASTER
    #   volume: 1.0
    #   pitch: 1.0

